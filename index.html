<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cara ou Coroa - Aposta vs Robô</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .game {
    background: rgba(0,0,0,0.4);
    border: 2px solid #ffd700;
    border-radius: 16px;
    padding: 30px;
    max-width: 520px;
    width: 100%;
    box-shadow: 0 10px 40px rgba(255,215,0,0.2);
  }
  h1 {
    text-align: center;
    color: #ffd700;
    margin-bottom: 8px;
    font-size: 28px;
  }
  .subtitle {
    text-align: center;
    color: #aaa;
    margin-bottom: 24px;
    font-size: 14px;
  }
  .scoreboard {
    display: flex;
    justify-content: space-between;
    background: rgba(255,255,255,0.05);
    padding: 14px;
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .score-box { text-align: center; flex: 1; }
  .score-box h3 { font-size: 13px; color: #aaa; margin-bottom: 4px; }
  .score-box .value { font-size: 22px; font-weight: bold; color: #ffd700; }
  .score-box .coins { color: #4ade80; }
  .robot { color: #f87171; }
  .coin-area {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 180px;
    margin: 20px 0;
    perspective: 1000px;
  }
  .coin {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ffeb70, #d4af37, #8b6f0f);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    color: #5a3e00;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 -6px 12px rgba(0,0,0,0.3);
    transform-style: preserve-3d;
    transition: transform 0.1s;
  }
  .coin.flipping {
    animation: flip 1.6s ease-in-out;
  }
  @keyframes flip {
    0%   { transform: rotateY(0)     translateY(0); }
    25%  { transform: rotateY(900deg) translateY(-80px); }
    50%  { transform: rotateY(1800deg) translateY(-120px); }
    75%  { transform: rotateY(2700deg) translateY(-80px); }
    100% { transform: rotateY(3600deg) translateY(0); }
  }
  .bet-section {
    background: rgba(255,255,255,0.05);
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 16px;
  }
  .bet-section label {
    display: block;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 6px;
  }
  .bet-input {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .bet-input input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #1a1a2e;
    color: #fff;
    font-size: 16px;
  }
  .quick-bets { display: flex; gap: 6px; }
  .quick-bets button {
    flex: 1;
    padding: 6px;
    background: #333;
    color: #fff;
    border: 1px solid #555;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
  }
  .quick-bets button:hover { background: #444; }
  .choice {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .choice button {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: 2px solid transparent;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .choice button:hover { background: rgba(255,255,255,0.15); }
  .choice button.selected {
    border-color: #ffd700;
    background: rgba(255,215,0,0.2);
  }
  .flip-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #ffd700, #ffaa00);
    color: #000;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .flip-btn:hover:not(:disabled) { transform: scale(1.02); }
  .flip-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .result {
    text-align: center;
    margin-top: 16px;
    padding: 12px;
    border-radius: 8px;
    font-weight: bold;
    min-height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .result.win  { background: rgba(74,222,128,0.2); color: #4ade80; }
  .result.lose { background: rgba(248,113,113,0.2); color: #f87171; }
  .reset-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: transparent;
    color: #888;
    border: 1px solid #555;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
</style>
</head>
<body>
  <div class="game">
    <h1>Cara ou Coroa</h1>
    <p class="subtitle">Aposte suas moedinhas contra o Robô</p>

    <div class="scoreboard">
      <div class="score-box">
        <h3>Suas Moedas</h3>
        <div class="value coins" id="playerCoins">100</div>
      </div>
      <div class="score-box">
        <h3>Vitórias</h3>
        <div class="value" id="wins">0</div>
      </div>
      <div class="score-box">
        <h3>Robô</h3>
        <div class="value robot" id="robotWins">0</div>
      </div>
    </div>

    <div class="coin-area">
      <div class="coin" id="coin">?</div>
    </div>

    <div class="bet-section">
      <label>Valor da Aposta</label>
      <div class="bet-input">
        <input type="number" id="betAmount" min="1" value="10" />
      </div>
      <div class="quick-bets">
        <button data-bet="5">5</button>
        <button data-bet="10">10</button>
        <button data-bet="25">25</button>
        <button data-bet="50">50</button>
        <button data-bet="all">Tudo</button>
      </div>
    </div>

    <div class="bet-section">
      <label>Sua Escolha</label>
      <div class="choice">
        <button data-choice="cara" class="choice-btn selected">CARA</button>
        <button data-choice="coroa" class="choice-btn">COROA</button>
      </div>
    </div>

    <button class="flip-btn" id="flipBtn">JOGAR MOEDA</button>
    <div class="result" id="result">Faça sua aposta e gire a moeda!</div>
    <button class="reset-btn" id="resetBtn">Reiniciar Jogo</button>
  </div>

<script>
  const state = {
    coins: 100,
    wins: 0,
    robotWins: 0,
    choice: 'cara',
    flipping: false
  };

  const $ = id => document.getElementById(id);
  const coinEl = $('coin');
  const resultEl = $('result');
  const flipBtn = $('flipBtn');
  const betInput = $('betAmount');

  function render() {
    $('playerCoins').textContent = state.coins;
    $('wins').textContent = state.wins;
    $('robotWins').textContent = state.robotWins;
  }

  document.querySelectorAll('.choice-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.flipping) return;
      document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.choice = btn.dataset.choice;
    });
  });

  document.querySelectorAll('.quick-bets button').forEach(btn => {
    btn.addEventListener('click', () => {
      if (state.flipping) return;
      const v = btn.dataset.bet;
      betInput.value = v === 'all' ? state.coins : v;
    });
  });

  flipBtn.addEventListener('click', () => {
    if (state.flipping) return;
    const bet = parseInt(betInput.value, 10);
    if (isNaN(bet) || bet <= 0) {
      resultEl.className = 'result lose';
      resultEl.textContent = 'Aposta inválida!';
      return;
    }
    if (bet > state.coins) {
      resultEl.className = 'result lose';
      resultEl.textContent = 'Você não tem moedas suficientes!';
      return;
    }
    if (state.coins <= 0) {
      resultEl.className = 'result lose';
      resultEl.textContent = 'Sem moedas! Reinicie o jogo.';
      return;
    }

    state.flipping = true;
    flipBtn.disabled = true;
    resultEl.className = 'result';
    resultEl.textContent = 'Girando...';
    coinEl.textContent = '';
    coinEl.classList.remove('flipping');
    void coinEl.offsetWidth;
    coinEl.classList.add('flipping');

    const result = Math.random() < 0.5 ? 'cara' : 'coroa';

    setTimeout(() => {
      coinEl.classList.remove('flipping');
      coinEl.textContent = result === 'cara' ? 'CARA' : 'COROA';
      coinEl.style.fontSize = '20px';

      if (state.choice === result) {
        state.coins += bet;
        state.wins++;
        resultEl.className = 'result win';
        resultEl.textContent = `Você ganhou ${bet} moedas! 🎉`;
      } else {
        state.coins -= bet;
        state.robotWins++;
        resultEl.className = 'result lose';
        resultEl.textContent = `O Robô venceu! Você perdeu ${bet} moedas.`;
      }

      render();
      state.flipping = false;
      flipBtn.disabled = false;

      if (state.coins <= 0) {
        resultEl.textContent += ' Fim de jogo!';
        flipBtn.disabled = true;
      }
    }, 1600);
  });

  $('resetBtn').addEventListener('click', () => {
    state.coins = 100;
    state.wins = 0;
    state.robotWins = 0;
    state.flipping = false;
    flipBtn.disabled = false;
    coinEl.textContent = '?';
    coinEl.style.fontSize = '28px';
    resultEl.className = 'result';
    resultEl.textContent = 'Faça sua aposta e gire a moeda!';
    render();
  });

  render();
</script>
</body>
</html>
